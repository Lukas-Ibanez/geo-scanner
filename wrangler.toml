name = "geo-scanner"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# --- KV: caché de resultados de escaneo por dominio ---
# Crear con: wrangler kv namespace create SCAN_CACHE
# y pegar el `id` (y opcional preview_id) aquí.
[[kv_namespaces]]
binding = "SCAN_CACHE"
id = "bcc955c5e1f343258b0e424b2e5db2dd"
preview_id = "8553708f3602489fadf053c799046027"

# --- D1: base de datos de leads ---
# Crear con: wrangler d1 create geo_leads
# y pegar el `database_id` aquí.
[[d1_databases]]
binding = "DB"
database_name = "geo_leads"
database_id = "1303ab9e-4ab7-47dc-a5df-05a609d3e9db"

# --- Workers AI: análisis de contenido (alternativa a Gemini) ---
[ai]
binding = "AI"

# --- Variables (no secretas) ---
# Proveedor de IA para el ESCANEO BASE (capa gratuita):
#   'gemini' (activo) | 'hybrid' | 'claude' | 'workers-ai'.
# NOTA: el informe detallado (nivel 'detailed') usa Claude SIEMPRE — está
# hardcoded en src/lib/detailed.ts e ignora este switch.
[vars]
AI_PROVIDER = "gemini"
# Modelo de Gemini: 3.1-flash-lite da 500 req/día gratis (vs 20 de 2.5-flash).
GEMINI_MODEL = "gemini-3.1-flash-lite"
# Tope interno de llamadas/día (bajo el límite real de 500 del free tier).
GEMINI_DAILY_LIMIT = "450"
# --- Claude (solo lo usa el informe detallado — es de pago) ---
# Modelo de Claude para el análisis de contenido: por defecto 'claude-haiku-4-5'.
# ANTHROPIC_MODEL = "claude-haiku-4-5"
# Tope interno de llamadas/día a Claude, global a contenido + informe detallado (0 = sin tope).
# ANTHROPIC_DAILY_LIMIT = "200"
# Modelo del informe detallado (nivel 'detailed'): por defecto 'claude-haiku-4-5'.
# DETAILED_MODEL = "claude-haiku-4-5"
# DETAILED_PASSPHRASE NO va aquí: es un secret (ver abajo).

# Secrets (no van aquí):
#   Local:  .dev.vars
#   Prod:   wrangler pages secret put GEMINI_API_KEY
#           wrangler pages secret put ANTHROPIC_API_KEY     (si AI_PROVIDER=claude o informe detallado)
#           wrangler pages secret put DETAILED_PASSPHRASE   (desbloquea el informe 'detailed')
#           wrangler pages secret put RESEND_API_KEY
#
# RESEND_FROM / RESEND_REPLY_TO pueden ir como variables de entorno del proyecto
# en el panel de Cloudflare Pages, o como secrets si se prefiere.
