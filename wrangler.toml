name = "geo-scanner"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# --- KV: caché de resultados de escaneo por dominio ---
# Crear con: wrangler kv namespace create SCAN_CACHE
# y pegar el `id` (y opcional preview_id) aquí.
[[kv_namespaces]]
binding = "SCAN_CACHE"
id = "bcc955c5e1f343258b0e424b2e5db2dd"
preview_id = "8553708f3602489fadf053c799046027"

# --- D1: base de datos de leads ---
# Crear con: wrangler d1 create geo_leads
# y pegar el `database_id` aquí.
[[d1_databases]]
binding = "DB"
database_name = "geo_leads"
database_id = "1303ab9e-4ab7-47dc-a5df-05a609d3e9db"

# --- Workers AI: análisis de contenido (alternativa a Gemini) ---
[ai]
binding = "AI"

# --- Variables (no secretas) ---
# Proveedor de IA para el ESCANEO BASE (capa gratuita):
#   'gemini' | 'hybrid' (recomendado) | 'claude' | 'workers-ai'.
# Cambió de "gemini" a "hybrid" después de pegarse contra el tope de 450/día
# en producción (KV `gemini:count:<fecha>` se llenaba tras horas de pruebas y
# los scans empezaban a degradar). Hybrid = Gemini primario, Workers AI
# (Llama 3.3 70B) como respaldo automático: si Gemini degrada por cuota
# 429, timeout o error de schema, Workers AI toma el control y el usuario
# nunca ve "El análisis de contenido con IA no estuvo disponible".
# NOTA: el informe detallado (nivel 'detailed') usa Claude SIEMPRE — está
# hardcoded en src/lib/detailed.ts e ignora este switch.
[vars]
AI_PROVIDER = "hybrid"
# Modelo de Gemini: 3.1-flash-lite da 500 req/día gratis (vs 20 de 2.5-flash).
GEMINI_MODEL = "gemini-3.1-flash-lite"
# Tope interno de llamadas/día a Gemini (al ras del free tier: 500 RPD).
# En hybrid Workers AI absorbe lo que Gemini rechace, así que este tope es
# solo una primera línea para no castigar la API gratuita.
GEMINI_DAILY_LIMIT = "500"
# --- Claude (solo lo usa el informe detallado — es de pago) ---
# Modelo de Claude para el SCORING (evaluateWithClaude: cliente y competidores
# en la comparativa manzana-con-manzana): por defecto 'claude-haiku-4-5'.
# Se mantiene en Haiku a propósito: barato y consistente entre sitios.
ANTHROPIC_MODEL = "claude-haiku-4-5"
# Tope interno de llamadas/día a Claude, global a contenido + informe detallado
# (0 = sin tope). Claude es de pago: este tope es para no comerse un cobro
# inesperado si algo sale mal (ej. loop infinito).
ANTHROPIC_DAILY_LIMIT = "200"
# Modelo de la PROSA del informe detallado (resumen ejecutivo, diagnóstico por
# dimensión, plan de acción, percepción IA, síntesis competitiva, preguntas):
# por defecto 'claude-sonnet-4-6' — es lo que el cliente paga (~US$0,15-0,40/reporte).
DETAILED_MODEL = "claude-sonnet-4-6"
# DETAILED_PASSPHRASE NO va aquí: es un secret (ver abajo).

# --- Cloudflare Turnstile (protección anti-bot) ---
# La SITE_KEY se inyecta al BUILD como PUBLIC_TURNSTILE_SITE_KEY (Astro expone
# las env vars con prefijo PUBLIC_* al frontend prerenderizado). Formas de setearla:
#   1) En local, exportala antes de `astro build`:
#        $env:PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAA..."
#        npm run build
#   2) En Cloudflare Pages (recomendado para prod): project → Settings →
#      Environment variables → agregar PUBLIC_TURNSTILE_SITE_KEY con el valor.
#      Cloudflare la pasa al comando de build automáticamente.
# Si no la ponés, el frontend cae a la test key `1x00000000000000000000AA`
# (siempre pasa; sirve para probar end-to-end sin tener keys reales).
#
# La SECRET key (clave anti-bot) va como SECRET (no en este archivo):
#   Local:  .dev.vars
#   Prod:   wrangler pages secret put TURNSTILE_SECRET

# Secrets (no van aquí):
#   Local:  .dev.vars
#   Prod:   wrangler pages secret put GEMINI_API_KEY
#           wrangler pages secret put ANTHROPIC_API_KEY     (si AI_PROVIDER=claude o informe detallado)
#           wrangler pages secret put DETAILED_PASSPHRASE   (desbloquea el informe 'detailed')
#           wrangler pages secret put RESEND_API_KEY
#           wrangler pages secret put TURNSTILE_SECRET      (clave anti-bot — vacío = modo dev)
#
# RESEND_FROM / RESEND_REPLY_TO / PUBLIC_TURNSTILE_SITE_KEY pueden ir como
# variables de entorno del proyecto en el panel de Cloudflare Pages.
