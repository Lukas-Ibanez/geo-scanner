name = "geo-scanner"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# --- KV: caché de resultados de escaneo por dominio ---
# Crear con: wrangler kv namespace create SCAN_CACHE
# y pegar el `id` (y opcional preview_id) aquí.
[[kv_namespaces]]
binding = "SCAN_CACHE"
id = "bcc955c5e1f343258b0e424b2e5db2dd"
preview_id = "8553708f3602489fadf053c799046027"

# --- D1: base de datos de leads ---
# Crear con: wrangler d1 create geo_leads
# y pegar el `database_id` aquí.
[[d1_databases]]
binding = "DB"
database_name = "geo_leads"
database_id = "1303ab9e-4ab7-47dc-a5df-05a609d3e9db"

# GEMINI_API_KEY se inyecta como secret (no va aquí):
#   Local:  .dev.vars
#   Prod:   wrangler pages secret put GEMINI_API_KEY
